<!DOCTYPE html>
<html>
<head>
  <title>Smart Inventory Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,198,255,0.18), transparent 25%),
        linear-gradient(135deg, #0f172a, #172554 45%, #1e293b);
      color: white;
      min-height: 100vh;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 26px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      font-size: 22px;
      font-weight: bold;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logout-btn {
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      color: white;
      cursor: pointer;
    }

    .page {
      padding: 24px;
      max-width: 1220px;
      margin: 0 auto;
    }

    .hero {
      margin-bottom: 20px;
      animation: fadeUp 0.6s ease;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }

    .hero p {
      margin: 0;
      color: #cbd5e1;
    }

    .grid-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 20px;
      animation: fadeUp 0.75s ease;
    }

    .glass {
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 18px 40px rgba(0,0,0,0.22);
      border-radius: 22px;
    }

    .stat-card {
      padding: 22px;
    }

    .stat-label {
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: bold;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .panel {
      padding: 22px;
      animation: fadeUp 0.9s ease;
    }

    .panel h3 {
      margin-top: 0;
      margin-bottom: 16px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 160px 140px;
      gap: 12px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: white;
      outline: none;
    }

    input::placeholder {
      color: #cbd5e1;
    }

    input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 4px rgba(56,189,248,0.16);
    }

    .btn-primary, .btn-danger {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      cursor: pointer;
      color: white;
      font-weight: bold;
    }

    .btn-primary {
      background: linear-gradient(90deg, #06b6d4, #3b82f6);
    }

    .btn-danger {
      background: linear-gradient(90deg, #ef4444, #dc2626);
      padding: 10px 12px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    th {
      color: #cbd5e1;
      font-size: 14px;
    }

    tr {
      transition: background 0.2s ease, transform 0.2s ease;
    }

    tr:hover {
      background: rgba(255,255,255,0.05);
    }

    .low-badge, .ok-badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .low-badge {
      background: rgba(239,68,68,0.18);
      color: #fca5a5;
    }

    .ok-badge {
      background: rgba(34,197,94,0.18);
      color: #86efac;
    }

    .chart-box {
      height: 320px;
    }

    .loader-screen {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .loader-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader {
      width: 52px;
      height: 52px;
      border: 4px solid rgba(255,255,255,0.20);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      background: rgba(15,23,42,0.95);
      border: 1px solid rgba(255,255,255,0.08);
      color: white;
      padding: 14px 18px;
      border-radius: 14px;
      box-shadow: 0 14px 35px rgba(0,0,0,0.25);
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: 0.25s ease;
      z-index: 999;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 980px) {
      .grid-cards {
        grid-template-columns: repeat(2, 1fr);
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .grid-cards {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 26px;
      }

      .page {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="loader" class="loader-screen">
    <div class="loader"></div>
  </div>

  <div class="navbar">
    <div class="brand">📦 Smart Inventory</div>
    <div class="nav-right">
      <span id="welcomeUser">Welcome</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="page">
    <div class="hero">
      <h1>Inventory Control Center</h1>
      <p>Track products, monitor low-stock items, and manage inventory in real time.</p>
    </div>

    <div class="grid-cards">
      <div class="glass stat-card">
        <div class="stat-label">Total Products</div>
        <div id="totalProducts" class="stat-value">0</div>
      </div>
      <div class="glass stat-card">
        <div class="stat-label">Low Stock Items</div>
        <div id="lowStock" class="stat-value">0</div>
      </div>
      <div class="glass stat-card">
        <div class="stat-label">Total Quantity</div>
        <div id="totalQuantity" class="stat-value">0</div>
      </div>
      <div class="glass stat-card">
        <div class="stat-label">Healthy Stock Items</div>
        <div id="healthyStock" class="stat-value">0</div>
      </div>
    </div>

    <div class="layout">
      <div class="glass panel">
        <h3>Add Product</h3>
        <div class="form-row">
          <input id="name" type="text" placeholder="Product name" />
          <input id="qty" type="number" placeholder="Quantity" />
          <button class="btn-primary" onclick="addProduct()">Add Product</button>
        </div>
      </div>

      <div class="glass panel">
        <h3>Inventory Chart</h3>
        <div class="chart-box">
          <canvas id="chart"></canvas>
        </div>
      </div>
    </div>

    <div class="glass panel">
      <h3>Products</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Quantity</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    let chartInstance = null;

    function getToken() {
      return localStorage.getItem('token');
    }

    function getHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${getToken()}`
      };
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');

      setTimeout(() => {
        toast.classList.remove('show');
      }, 2200);
    }

    function showLoader() {
      document.getElementById('loader').classList.remove('hidden');
    }

    function hideLoader() {
      document.getElementById('loader').classList.add('hidden');
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    function ensureAuth() {
      const token = getToken();

      if (!token) {
        window.location.href = 'login.html';
        return false;
      }

      const user = JSON.parse(localStorage.getItem('user') || '{}');
      document.getElementById('welcomeUser').textContent = `Welcome, ${user.username || 'User'}`;
      return true;
    }

    function renderChart(labels, values) {
      if (chartInstance) {
        chartInstance.destroy();
      }

      chartInstance = new Chart(document.getElementById('chart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Stock Quantity',
            data: values
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              labels: {
                color: '#ffffff'
              }
            }
          },
          scales: {
            x: {
              ticks: { color: '#e2e8f0' },
              grid: { color: 'rgba(255,255,255,0.08)' }
            },
            y: {
              beginAtZero: true,
              ticks: { color: '#e2e8f0' },
              grid: { color: 'rgba(255,255,255,0.08)' }
            }
          }
        }
      });
    }

    async function loadProducts() {
      if (!ensureAuth()) return;

      showLoader();

      try {
        const res = await fetch('http://localhost:30009/api/products', {
          headers: getHeaders()
        });

        const data = await res.json();

        if (!res.ok) {
          if (res.status === 401) {
            logout();
            return;
          }
          throw new Error(data.error || 'Failed to load products');
        }

        const totalProducts = data.length;
        const lowStock = data.filter(item => Number(item.quantity) < 5).length;
        const totalQuantity = data.reduce((sum, item) => sum + Number(item.quantity), 0);
        const healthyStock = data.filter(item => Number(item.quantity) >= 5).length;

        document.getElementById('totalProducts').textContent = totalProducts;
        document.getElementById('lowStock').textContent = lowStock;
        document.getElementById('totalQuantity').textContent = totalQuantity;
        document.getElementById('healthyStock').textContent = healthyStock;

        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        const labels = [];
        const values = [];

        data.forEach(item => {
          labels.push(item.name);
          values.push(Number(item.quantity));

          tableBody.innerHTML += `
            <tr>
              <td>${item.id}</td>
              <td>${item.name}</td>
              <td>${item.quantity}</td>
              <td>
                ${Number(item.quantity) < 5
                  ? '<span class="low-badge">Low Stock</span>'
                  : '<span class="ok-badge">Healthy</span>'}
              </td>
              <td>
                <button class="btn-danger" onclick="deleteProduct(${item.id})">Delete</button>
              </td>
            </tr>
          `;
        });

        renderChart(labels, values);
      } catch (error) {
        showToast(error.message);
      } finally {
        hideLoader();
      }
    }

    async function addProduct() {
      const name = document.getElementById('name').value.trim();
      const quantity = document.getElementById('qty').value.trim();

      if (!name || !quantity) {
        showToast('Enter product name and quantity');
        return;
      }

      showLoader();

      try {
        const res = await fetch('http://localhost:30009/api/products', {
          method: 'POST',
          headers: getHeaders(),
          body: JSON.stringify({
            name,
            quantity: Number(quantity)
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Failed to add product');
        }

        document.getElementById('name').value = '';
        document.getElementById('qty').value = '';

        showToast('Product added successfully');
        await loadProducts();
      } catch (error) {
        showToast(error.message);
      } finally {
        hideLoader();
      }
    }

    async function deleteProduct(id) {
      showLoader();

      try {
        const res = await fetch(`http://localhost:30009/api/products/${id}`, {
          method: 'DELETE',
          headers: getHeaders()
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Failed to delete product');
        }

        showToast('Product deleted');
        await loadProducts();
      } catch (error) {
        showToast(error.message);
      } finally {
        hideLoader();
      }
    }

    loadProducts();
  </script>
</body>
</html>
